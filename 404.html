<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Priority Tax Relief</title>
<style>
  :root { --ink:#141515; --green:#047B44; --orange:#FE5000; --bone:#EBEBDC; --grey:#B9B9B2; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#fff; color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:32px;
  }
  .wrap { max-width:560px; text-align:center; }
  .flag { width:42px; height:auto; margin:0 auto 28px; display:block; color:var(--orange); }
  .code { font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--green); font-weight:700; margin:0 0 14px; }
  h1 { font-size:clamp(40px,8vw,72px); line-height:1.02; letter-spacing:-.02em; margin:0 0 18px; font-weight:800; }
  p { font-size:18px; line-height:1.55; color:#33332F; margin:0 0 32px; }
  .btn {
    display:inline-block; background:var(--orange); color:#fff; text-decoration:none;
    font-weight:700; font-size:15px; letter-spacing:.02em; padding:15px 30px; border-radius:8px;
    white-space:nowrap;
    transition:transform .12s ease-out, background .12s ease-out;
  }
  .btn:hover { background:#e04800; }
  .btn:active { transform:scale(.98); }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="flag" width="97.942" height="139.889" viewBox="0 0 97.942 139.889" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

    </svg>
    <p class="code">Error 404</p>
    <h1>We couldn&rsquo;t find that page.</h1>
    <p>The page you&rsquo;re looking for may have moved or no longer exists. Let&rsquo;s get you back on track.</p>
    <a class="btn" id="home" href="index.html">Back to Priority Tax Relief</a>
  </div>
  <script>
    /* Resolve the site root whether deployed to a user page (/) or a project page (/repo/). */
    (function () {
      try {
        var parts = location.pathname.split('/').filter(Boolean);
        // On GitHub project pages the first segment is the repo name.
        var base = (location.hostname.endsWith('github.io') && parts.length > 1) ? '/' + parts[0] + '/' : '/';
        document.getElementById('home').setAttribute('href', base + 'index.html');
      } catch (e) {}
    })();
  </script>
